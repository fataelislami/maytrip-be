; PHP-FPM worker config tuned for a 2 GB VPS
[www]
pm = ondemand
pm.max_children = 12
pm.process_idle_timeout = 30s
pm.max_requests = 500

; Log slow requests so we can spot N+1s & long DB queries
request_slowlog_timeout = 3s
slowlog = /dev/stderr

; Send fpm logs to stderr (docker logs)
access.log = /dev/null
catch_workers_output = yes
decorate_workers_output = no
